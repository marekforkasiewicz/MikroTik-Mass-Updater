<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Wireless Bridge - SXT/LHG style outdoor unit -->
  <defs>
    <linearGradient id="sxt-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#718096"/>
      <stop offset="50%" style="stop-color:#a0aec0"/>
      <stop offset="100%" style="stop-color:#718096"/>
    </linearGradient>
  </defs>
  <!-- Dish/Antenna panel -->
  <ellipse cx="32" cy="32" rx="24" ry="24" fill="url(#sxt-grad)" stroke="#4a5568" stroke-width="2"/>
  <ellipse cx="32" cy="32" rx="18" ry="18" fill="#e2e8f0" stroke="#a0aec0" stroke-width="1"/>
  <ellipse cx="32" cy="32" rx="10" ry="10" fill="#cbd5e0"/>
  <!-- Center feed -->
  <circle cx="32" cy="32" r="5" fill="#2d3748"/>
  <circle cx="32" cy="32" r="2" fill="#4299e1"/>
  <!-- Signal waves (pointing right) -->
  <path d="M56 32 Q62 22 62 32 Q62 42 56 32" fill="none" stroke="#4299e1" stroke-width="2"/>
  <path d="M60 32 Q68 18 68 32 Q68 46 60 32" fill="none" stroke="#4299e1" stroke-width="2" opacity="0.5"/>
  <!-- Mount bracket -->
  <rect x="12" y="48" width="40" height="6" rx="2" fill="#4a5568"/>
  <rect x="28" y="54" width="8" height="6" rx="1" fill="#2d3748"/>
</svg>
