<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Edge Router / Gateway - Server rack style with globe -->
  <defs>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
  </defs>
  <!-- Main body -->
  <rect x="8" y="14" width="48" height="36" rx="4" fill="url(#body-grad)" stroke="#1a202c" stroke-width="2"/>
  <!-- Rack lines -->
  <rect x="12" y="20" width="40" height="8" rx="2" fill="#1a202c"/>
  <rect x="12" y="32" width="40" height="8" rx="2" fill="#1a202c"/>
  <!-- LED indicators -->
  <circle cx="18" cy="24" r="2" fill="#48bb78"/>
  <circle cx="26" cy="24" r="2" fill="#48bb78"/>
  <circle cx="34" cy="24" r="2" fill="#4299e1"/>
  <circle cx="18" cy="36" r="2" fill="#48bb78"/>
  <circle cx="26" cy="36" r="2" fill="#f6e05e"/>
  <!-- Ports -->
  <rect x="40" y="22" width="8" height="4" rx="1" fill="#718096"/>
  <rect x="40" y="34" width="8" height="4" rx="1" fill="#718096"/>
  <!-- Globe symbol (gateway) -->
  <circle cx="32" cy="8" r="6" fill="none" stroke="#4299e1" stroke-width="1.5"/>
  <ellipse cx="32" cy="8" rx="3" ry="6" fill="none" stroke="#4299e1" stroke-width="1"/>
  <line x1="26" y1="8" x2="38" y2="8" stroke="#4299e1" stroke-width="1"/>
  <!-- Base -->
  <rect x="16" y="52" width="32" height="4" rx="2" fill="#2d3748"/>
</svg>
