<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Network Switch - CRS rack mount style -->
  <defs>
    <linearGradient id="switch-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748"/>
      <stop offset="100%" style="stop-color:#1a202c"/>
    </linearGradient>
  </defs>
  <!-- Main body -->
  <rect x="4" y="20" width="56" height="24" rx="3" fill="url(#switch-grad)" stroke="#4a5568" stroke-width="2"/>
  <!-- Port row 1 -->
  <rect x="10" y="26" width="5" height="4" rx="1" fill="#4299e1"/>
  <rect x="17" y="26" width="5" height="4" rx="1" fill="#4299e1"/>
  <rect x="24" y="26" width="5" height="4" rx="1" fill="#48bb78"/>
  <rect x="31" y="26" width="5" height="4" rx="1" fill="#48bb78"/>
  <rect x="38" y="26" width="5" height="4" rx="1" fill="#48bb78"/>
  <rect x="45" y="26" width="5" height="4" rx="1" fill="#718096"/>
  <!-- Port row 2 -->
  <rect x="10" y="34" width="5" height="4" rx="1" fill="#48bb78"/>
  <rect x="17" y="34" width="5" height="4" rx="1" fill="#48bb78"/>
  <rect x="24" y="34" width="5" height="4" rx="1" fill="#48bb78"/>
  <rect x="31" y="34" width="5" height="4" rx="1" fill="#718096"/>
  <rect x="38" y="34" width="5" height="4" rx="1" fill="#718096"/>
  <rect x="45" y="34" width="5" height="4" rx="1" fill="#718096"/>
  <!-- SFP ports -->
  <rect x="52" y="26" width="4" height="12" rx="1" fill="#f6e05e"/>
  <!-- Logo area -->
  <text x="32" y="18" text-anchor="middle" font-size="6" fill="#718096" font-family="sans-serif">SWITCH</text>
  <!-- Rack ears -->
  <rect x="0" y="22" width="4" height="20" rx="1" fill="#4a5568"/>
  <rect x="60" y="22" width="4" height="20" rx="1" fill="#4a5568"/>
  <circle cx="2" cy="27" r="1" fill="#2d3748"/>
  <circle cx="2" cy="37" r="1" fill="#2d3748"/>
  <circle cx="62" cy="27" r="1" fill="#2d3748"/>
  <circle cx="62" cy="37" r="1" fill="#2d3748"/>
</svg>
