<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Access Point - Ceiling mount cAP style -->
  <defs>
    <linearGradient id="ap-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <radialGradient id="ap-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </radialGradient>
  </defs>
  <!-- WiFi waves -->
  <path d="M32 6 Q22 16 32 16 Q42 16 32 6" fill="none" stroke="#4299e1" stroke-width="2" opacity="0.5"/>
  <path d="M32 2 Q18 14 32 14 Q46 14 32 2" fill="none" stroke="#4299e1" stroke-width="2" opacity="0.3"/>
  <!-- AP Body (disc shape) -->
  <ellipse cx="32" cy="38" rx="26" ry="12" fill="url(#ap-grad)" stroke="#a0aec0" stroke-width="2"/>
  <!-- Center dome -->
  <ellipse cx="32" cy="34" rx="10" ry="5" fill="url(#ap-center)"/>
  <!-- LED ring -->
  <ellipse cx="32" cy="34" rx="6" ry="3" fill="none" stroke="#48bb78" stroke-width="2"/>
  <!-- Mount point -->
  <rect x="28" y="50" width="8" height="6" rx="1" fill="#718096"/>
  <circle cx="32" cy="56" r="3" fill="#4a5568"/>
</svg>
